    <meta

      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#070709" />
    <meta name="description" content="THE DEAD HOUSE — an arcade rail shooter tribute by sley. Blast through undead hordes across four chapters." />
    <meta property="og:title" content="THE DEAD HOUSE" />
    <meta property="og:description" content="Arcade rail shooter tribute by sley. Four chapters, bosses, branching routes, and mobile support." />
    <meta property="og:image" content="https://raw.githubusercontent.com/KingsleyKwan/the_dead_house/main/public/social-preview.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="THE DEAD HOUSE" />

    <title>THE DEAD HOUSE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #070709;
        color: #f2e6c9;
        font-family: Orbitron, system-ui, sans-serif;
        overflow: hidden;
      }
      #boot-error {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        background: #070709;
        color: #ff3b2f;
        font-size: 14px;
        line-height: 1.6;
      }
      #boot-error.show { display: flex; flex-direction: column; gap: 12px; }
      #hint-mobile, #rotate-hint { display: none; }
      #mobile-ui { display: none; }
    </style>
    <script>
      // Instant redirect to the playable build on GitHub Pages (repo root is Vite source only)
      (function () {
        var host = location.hostname;
        var path = location.pathname || "";
        var isDev = host === "localhost" || host === "127.0.0.1";
        var playUrl = "https://kingsleykwan.github.io/the_dead_house/docs/";
        if (isDev) return;
        // Already inside /docs/ — let the built page load
        if (path.indexOf("/docs") !== -1) return;
        // On github.io project site root → go to built game
        if (host === "kingsleykwan.github.io") {
          location.replace(playUrl);
          return;
        }
        // file:// or other hosts → play online
        if (location.protocol === "file:" || host === "github.com") {
          location.replace(playUrl);
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-CHN7z8V7.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C-_Kof3f.css">
  </head>
  <body>
    <div id="boot-error" role="alert">
      <strong>THE DEAD HOUSE</strong>
      <span style="color:#f2e6c9">Play on phone or desktop — no install:</span>
      <a
        id="play-online"
        href="https://kingsleykwan.github.io/the_dead_house/docs/"
        style="display:inline-block;margin-top:8px;padding:14px 22px;background:#c43c2b;color:#fff;text-decoration:none;font-family:'Press Start 2P',monospace;font-size:12px;border-radius:8px;"
      >PLAY ONLINE</a>
    </div>
    <div id="app">
      <div id="cabinet">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="scanlines" aria-hidden="true"></div>
        <div id="hud"></div>
        <div id="overlay"></div>
        <div id="mobile-ui" hidden aria-hidden="true">
          <button type="button" id="btn-reload" class="mob-btn mob-reload">RELOAD</button>
        </div>
      </div>
      <p id="hint" class="hint-desktop">
        Shoot: Click · Reload: R or click outside · Start: Space · 2P Join: 2
      </p>
      <p id="hint-mobile" class="hint-mobile">
        Tap to shoot · RELOAD button · Tap screen to start · Rotate to landscape
      </p>
      <p id="rotate-hint" class="rotate-hint">Rotate your device to landscape for the best experience</p>
    </div>
    <script>
      setTimeout(function () {
        if (window.__DEAD_HOUSE_BOOTED__) return;
        var el = document.getElementById("boot-error");
        if (el) el.classList.add("show");
      }, 2000);
    </script>
  </body>
</html>
